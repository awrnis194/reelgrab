<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#2BD4CB"/>
      <stop offset="0.55" stop-color="#1FB8B0"/>
      <stop offset="1" stop-color="#0E7A74"/>
    </linearGradient>
    <linearGradient id="sheen" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#FFFFFF" stop-opacity="0.18"/>
      <stop offset="0.5" stop-color="#FFFFFF" stop-opacity="0"/>
    </linearGradient>
  </defs>
  <rect width="64" height="64" rx="15" fill="url(#bg)"/>
  <rect width="64" height="64" rx="15" fill="url(#sheen)"/>
  <!-- faint candle bars give it the "market" read at larger sizes -->
  <g fill="#0B1318" opacity="0.22">
    <rect x="13" y="34" width="6" height="17" rx="3"/>
    <rect x="29" y="26" width="6" height="25" rx="3"/>
    <rect x="45" y="18" width="6" height="33" rx="3"/>
  </g>
  <!-- spark line: soft dark drop shadow, then crisp white stroke -->
  <path d="M11 43 L25 29 L34 35 L51 15" fill="none" stroke="#0B1318" stroke-width="7.5"
    stroke-linecap="round" stroke-linejoin="round" opacity="0.3" transform="translate(0 2.5)"/>
  <path d="M11 43 L25 29 L34 35 L51 15" fill="none" stroke="#FFFFFF" stroke-width="7"
    stroke-linecap="round" stroke-linejoin="round"/>
  <circle cx="51" cy="15" r="5.5" fill="#FFFFFF"/>
  <circle cx="51" cy="15" r="2.4" fill="#1FB8B0"/>
</svg>
