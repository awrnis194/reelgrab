# Render's free tier puts the service to sleep after ~15 idle minutes, giving
# the next visitor a 30–60s cold start. This ping keeps it awake around the
# clock (one free web service stays within Render's free instance hours).
name: Keep Render warm

on:
  schedule:
    - cron: '*/10 * * * *'
  workflow_dispatch:

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping health endpoint
        run: curl -fsS --max-time 30 https://reelgrab.xyz/api/health
